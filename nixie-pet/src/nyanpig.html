<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@font-face {
    font-family: 'ArkPixel';
    src: url('nixie://localhost/fonts/ArkPixel.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    background: transparent;
    width: 100%; height: 100%;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
}
body {
    display: block;
    position: relative;
    margin: 0;
    width: 100%;
    height: 100vh;
}
/* 外圈铺满窗口（Rust 在绿区内 set_ignore_cursor_events）；内圈 #pet 可点 */
.pet-look-field {
    position: absolute;
    left: 0;
    top: 0;
    right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
}
/* 验收后可改回 rgba 描边/底色；当前外圈+内圈均为透明，不占视觉 */
.pet-look-field.pet-look-debug {
    outline: none;
    background: transparent;
}
.pet-look-field.pet-look-debug::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    width: 152px;
    height: 108px;
    transform: translate(-50%, -50%);
    box-sizing: border-box;
    border: 2px solid transparent;
    background: transparent;
    pointer-events: none;
    z-index: 0;
}

/* ── Pet container — mood class + drag region ── */
#pet {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 1;
    pointer-events: auto;
    padding: 0 2px 2px;
    cursor: grab;
    /* 无 OS 轮询时（如 Linux Wayland）用倍率近似外圈；macOS/Windows 由 Rust 整窗判定 */
    --look-zone-w: 2.65;
    --look-zone-h: 3.05;
    /* 鼠标朝向：转身结束后「挪过去」的横向位移（px，由 JS 写入 --pet-look-nudge） */
    --pet-look-nudge: 14px;
    --body1: #f19183; --body2: #fcd8d7; --stains: #fac4b8;
    --eyes-c: #0c0b0b; --ears-c: #f19183;
    --snout1: #f79197; --snout2: #f66b79; --snout-holes: #e73b36;
    --rc1: #e12523; --rc2: #dc8d30; --rc3: #deeb44;
    --rc4: #01eb3e; --rc5: #138fe9; --rc6: #7127ee;
    --rainbow-opacity: 0;
    --fly: 0.4;
    --fly-h: 4px;
}

/* 先回中（原地）→ 转身 → 再横移；look-shift-recenter 仅用于快速归零位移 */
.pet-look-shift {
    position: relative;
    width: 100%;
    max-width: 160px;
    transition: transform 1.15s cubic-bezier(0.22, 0.99, 0.35, 1);
    transform: translateX(var(--pet-look-nudge));
    will-change: transform;
}
.pet-look-shift.look-shift-recenter {
    transition-duration: 0.38s;
    transition-timing-function: ease-out;
}
.pet-visual {
    position: relative;
    width: 100%;
    max-width: 160px;
    transform-origin: 50% 38%;
    transition: transform 0.78s cubic-bezier(0.45, 0, 0.2, 1);
}
#pet[data-facing="right"] .pet-visual {
    transform: scaleX(1);
}
#pet[data-facing="left"] .pet-visual {
    transform: scaleX(-1);
}
/* 角标在 #pet 上定位（含 speech-stack 高度）；向左看时改到左侧，与镜像后的猪对齐 */
#pet[data-facing="left"] .mood-indicator:not(.indicator-bulb) {
    right: auto;
    left: 5%;
}
#pet[data-facing="left"] .zzz {
    right: auto;
    left: 8%;
}

/* ════════ 9 MOOD SKINS ════════ */

#pet.mood-idle {
    --body1: #f19183; --body2: #fcd8d7; --stains: #fac4b8;
    --eyes-c: #0c0b0b; --ears-c: #f19183;
    --snout1: #f79197; --snout2: #f66b79; --snout-holes: #e73b36;
    --rainbow-opacity: 0;
    --fly: 0.4; --fly-h: 3px;
}

#pet.mood-coding {
    --body1: #f19183; --body2: #fcd8d7; --stains: #fac4b8;
    --eyes-c: #0c0b0b; --ears-c: #f19183;
    --snout1: #f79197; --snout2: #f66b79; --snout-holes: #e73b36;
    --rc1: #e12523; --rc2: #dc8d30; --rc3: #deeb44;
    --rc4: #01eb3e; --rc5: #138fe9; --rc6: #7127ee;
    --rainbow-opacity: 1;
    --fly: 0.4; --fly-h: 4px;
}

#pet.mood-thinking {
    --body1: #f19183; --body2: #fcd8d7; --stains: #fac4b8;
    --eyes-c: #0c0b0b; --ears-c: #f19183;
    --snout1: #f79197; --snout2: #f66b79; --snout-holes: #e73b36;
    --rc1: #ffffff; --rc2: #ffffff; --rc3: #f0f0f0;
    --rc4: #f0f0f0; --rc5: #ffffff; --rc6: #ffffff;
    --rainbow-opacity: 1;
    --fly: 0.8; --fly-h: 5px;
}

#pet.mood-writing {
    --body1: #f19183; --body2: #fcd8d7; --stains: #fac4b8;
    --eyes-c: #0c0b0b; --ears-c: #f19183;
    --snout1: #f79197; --snout2: #f66b79; --snout-holes: #e73b36;
    --rc1: #e12523; --rc2: #dc8d30; --rc3: #deeb44;
    --rc4: #01eb3e; --rc5: #138fe9; --rc6: #7127ee;
    --rainbow-opacity: 1;
    --fly: 0.25; --fly-h: 5px;
}

#pet.mood-running {
    --body1: #e87830; --body2: #f5a862; --stains: #f0934a;
    --eyes-c: #0c0b0b; --ears-c: #d56820;
    --snout1: #f5a862; --snout2: #e8923a; --snout-holes: #c86818;
    --rc1: #ff2020; --rc2: #ff5533; --rc3: #ff8844;
    --rc4: #ffbb22; --rc5: #ff8844; --rc6: #ff5533;
    --rainbow-opacity: 1;
    --fly: 0.15; --fly-h: 5px;
}

#pet.mood-searching {
    --body1: #f19183; --body2: #fcd8d7; --stains: #fac4b8;
    --rainbow-opacity: 0;
    --fly: 0.4; --fly-h: 4px;
}
#pet.mood-web-search {
    --body1: #f19183; --body2: #fcd8d7; --stains: #fac4b8;
    --rc1: #0a4d6b; --rc2: #117799; --rc3: #1ea3c4;
    --rc4: #5bc4e0; --rc5: #a8e6f0; --rc6: #e0f7fa;
    --rainbow-opacity: 1;
    --fly: 0.4; --fly-h: 4px;
}

#pet.mood-error {
    --body1: #410a07; --body2: #bb1626; --stains: #790813;
    --eyes-c: #f0d459; --ears-c: #2b1d05;
    --snout1: #db2839; --snout2: #ae1f2d; --snout-holes: #900f0b;
    --rc1: #d71440; --rc2: #ff6c40; --rc3: #ffce21;
    --rc4: #ffce21; --rc5: #ff6c40; --rc6: #d71440;
    --rainbow-opacity: 1;
    --fly: 0.1; --fly-h: 0px;
}

#pet.mood-success {
    --body1: #f89f39; --body2: #fdb85a; --stains: #fedda7;
    --eyes-c: #0c0b0b; --ears-c: #dc790f;
    --snout1: #ffdea1; --snout2: #fedea2; --snout-holes: #f98d0e;
    --rc1: #f89f39; --rc2: #fdb85a; --rc3: #fff0b8;
    --rc4: #fdb85a; --rc5: #f89f39; --rc6: #fff0b8;
    --rainbow-opacity: 1;
    /* 与 coding 接近，避免切入 success 时 rw/jagger 周期骤变导致一帧「抽一下」 */
    --fly: 0.38; --fly-h: 5px;
}

#pet.mood-sleeping {
    --body1: #c0a8a4; --body2: #e0d4d2; --stains: #d0c0bc;
    --eyes-c: #999; --ears-c: #c0a8a4;
    --snout1: #d0b8b4; --snout2: #c4a8a2; --snout-holes: #a88888;
    --rainbow-opacity: 0;
    --fly: 0.4; --fly-h: 0px;
}

/* ════════ 台词 + 番茄钟叠放（同宽居中，台词在上层） ════════ */

.speech-stack {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    align-self: center;
    width: 100%;
    max-width: 160px;
    margin-bottom: 4px;
    min-height: 0;
    /* 与主猪 SVG 同频上下浮动，台词与气泡一体运动（勿只对气泡子 svg 做 jagger） */
    animation: jagger calc(var(--fly) * 1s) ease-in-out infinite alternate;
}

#pet[data-pomo-running="1"] .speech-stack {
    min-height: 20px;
    min-width: 56px;
}

/* ════════ PIXEL BUBBLE（阶梯圆角 + 硬边灰影 + 1px 黑描边，与参考图一致） ════════ */

.pix-bubble {
    position: relative;
    display: inline-flex;
    align-items: stretch;
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    border: none;
    background: transparent;
    min-height: 28px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    -webkit-font-smoothing: none;
    -moz-osx-font-smoothing: grayscale;
}
.pix-bubble-svg {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    shape-rendering: crispEdges;
    pointer-events: none;
}
.pix-bubble-drop {
    stroke: none;
}
.pix-bubble-face {
    fill: #fff;
    stroke: #000;
    stroke-width: 1px;
    vector-effect: non-scaling-stroke;
}
.pix-bubble-inner {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 7px 14px 11px;
    white-space: nowrap;
    box-sizing: border-box;
    font-family: 'ArkPixel', monospace;
    font-size: 7px;
    line-height: 1.35;
    color: #111;
}
/* 台词气泡字重略大，与像素块面更相称（番茄钟略小一格） */
.bubble .pix-bubble-inner {
    font-size: 9px;
    line-height: 1.4;
    padding: 8px 14px 12px;
}
.bubble-mood-stack {
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
}
.bubble-line1 {
    display: flex;
    align-items: center;
    gap: 4px;
    width: 100%;
}
.focus-file-hint {
    font-size: 8px;
    line-height: 1.3;
    color: #555;
    max-width: 13em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.focus-file-hint:empty {
    display: none !important;
}

.bubble {
    position: relative;
    z-index: 2;
    max-height: 80px;
    overflow: hidden;
    transition: opacity 0.25s ease, max-height 0.25s ease, margin 0.25s ease, min-height 0.25s ease;
}
.bubble:not(.bubble-visible) {
    opacity: 0;
    max-height: 0;
    min-height: 0;
    margin-bottom: 0;
    pointer-events: none;
}
.bubble:not(.bubble-visible) .pix-bubble-inner {
    padding-top: 0;
    padding-bottom: 0;
    min-height: 0;
}
.bubble.bubble-visible .dot {
    display: none;
}
.bubble .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #ccc;
    flex-shrink: 0;
    transition: all 0.3s;
}
.bubble .dot.active {
    background: #2ecc40;
    box-shadow: 0 0 3px rgba(46,204,64,0.6);
}
/* ════════ 主猪画布（仅作用于彩虹+猪；勿用全局 svg，否则会误伤气泡/图标并导致左侧 mask 半透明） ════════ */
/* 外层只做上下浮动 / 错误抖动；内层只做庆祝 scale/filter。避免与 #pet 同元素抢 transform 造成瞬切、比例抽风。 */

.pet-motion-wrap {
    width: 100%;
    max-width: 160px;
    overflow: visible;
    animation: jagger calc(var(--fly) * 1s) ease-in-out infinite alternate;
}
.pet-celebrate-layer {
    width: 100%;
    transform-origin: 50% 92%;
}
svg.pet-main-svg {
    display: block;
    width: 100%;
    max-width: 160px;
    overflow: visible;
    -webkit-mask-image: linear-gradient(to left, black 65%, transparent 90%);
    mask-image: linear-gradient(to left, black 65%, transparent 90%);
}
@keyframes jagger {
    to { transform: translateY(var(--fly-h)); }
}

#pet.mood-error .pet-motion-wrap,
#pet.mood-error .speech-stack {
    animation: shake 0.1s ease-in-out infinite;
}
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-2px); }
    75% { transform: translateX(2px); }
}
@keyframes jump {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}
#pet.pet-jump {
    animation: jump 0.32s ease-out forwards;
}

#pet.mood-sleeping .pet-motion-wrap,
#pet.mood-sleeping svg.pet-main-svg *,
#pet.mood-sleeping .speech-stack {
    animation-play-state: paused !important;
}

/* ════════ RAINBOW ════════ */

.rainbow {
    opacity: var(--rainbow-opacity);
    transition: opacity 0.5s ease;
}
.rainbow rect {
    width: 5px;
    height: 6px;
    stroke: transparent;
    fill: url(#rainbow-colors);
}
.rainbow rect:nth-child(1) {
    transform: translate(25px, 8.4px);
    animation: rw1 calc(var(--fly) * 1s) ease-in-out calc(var(--fly) * 0.167s) infinite alternate;
}
.rainbow rect:nth-child(2) {
    transform: translate(20.2px, 8.3px);
    animation: rw2 calc(var(--fly) * 1s) ease-in-out calc(var(--fly) * 0.333s) infinite alternate;
}
.rainbow rect:nth-child(3) {
    transform: translate(15.4px, 8.2px);
    animation: rw3 calc(var(--fly) * 1s) ease-in-out calc(var(--fly) * 0.5s) infinite alternate;
}
.rainbow rect:nth-child(4) {
    transform: translate(10.6px, 8.1px);
    animation: rw4 calc(var(--fly) * 1s) ease-in-out calc(var(--fly) * 0.667s) infinite alternate;
}
.rainbow rect:nth-child(5) {
    transform: translate(5.8px, 8px);
    animation: rw5 calc(var(--fly) * 1s) ease-in-out calc(var(--fly) * 0.833s) infinite alternate;
}
.rainbow rect:nth-child(6) {
    transform: translate(1px, 7.9px);
    animation: rw6 calc(var(--fly) * 1s) ease-in-out calc(var(--fly) * 1s) infinite alternate;
}
@keyframes rw1 { to { transform: translate(25px, 9.07px); } }
@keyframes rw2 { to { transform: translate(20.2px, 9.63px); } }
@keyframes rw3 { to { transform: translate(15.4px, 10.2px); } }
@keyframes rw4 { to { transform: translate(10.6px, 10.77px); } }
@keyframes rw5 { to { transform: translate(5.8px, 11.33px); } }
@keyframes rw6 { to { transform: translate(1px, 11.9px); } }

.rainbow-color1 { stop-color: var(--rc1); transition: stop-color 0.5s; }
.rainbow-color2 { stop-color: var(--rc2); transition: stop-color 0.5s; }
.rainbow-color3 { stop-color: var(--rc3); transition: stop-color 0.5s; }
.rainbow-color4 { stop-color: var(--rc4); transition: stop-color 0.5s; }
.rainbow-color5 { stop-color: var(--rc5); transition: stop-color 0.5s; }
.rainbow-color6 { stop-color: var(--rc6); transition: stop-color 0.5s; }

/* ════════ PIG ════════ */

.pig { transform: translate(-29px); }

.pig .body1, .tail rect, .foot rect {
    fill: var(--body1);
    transition: fill 0.5s ease;
}
.pig .body2 {
    fill: var(--body2);
    transition: fill 0.5s ease;
}
.stains {
    fill: var(--stains);
    transition: fill 0.5s ease;
}
.ears rect {
    fill: var(--ears-c);
    transition: fill 0.5s ease;
}

.eyes {
    transform: translate(52px);
}
.eyes rect {
    fill: var(--eyes-c);
    transition: fill 0.5s ease;
    animation: blink 2s step-start infinite;
}
@keyframes blink {
    0%, 4% { opacity: 1; }
    5%, 10% { opacity: 0; }
    11% { opacity: 1; }
}
#pet.mood-sleeping .eyes rect {
    opacity: 0 !important;
    animation: none;
}

.round-glasses {
    display: none;
    transform: translate(52px);
}
.round-glasses circle {
    fill: none;
    stroke: #1a1a1a;
    stroke-width: 0.5;
}
#pet.mood-searching .round-glasses {
    display: block;
}
#pet.mood-searching .eyes rect {
    opacity: 0;
    animation: none;
}

.sunglasses {
    display: none;
    transform: translate(52px);
}
.sunglasses rect {
    fill: #1a1a1a;
}
#pet.mood-web-search .sunglasses {
    display: block;
}
#pet.mood-web-search .eyes rect {
    opacity: 0;
    animation: none;
}

.snout {
    stroke: transparent;
    transform: translate(52px);
    animation: sniff 2s ease-in-out infinite;
}
.snout .snout1 { fill: var(--snout1); transition: fill 0.5s ease; }
.snout .snout2 { fill: var(--snout2); transition: fill 0.5s ease; }
.snout .snout-holes { fill: var(--snout-holes); transition: fill 0.5s ease; }
@keyframes sniff {
    5%, 15%, 25% { transform: translate(52px); }
    10%, 20% { transform: translate(52.5px); }
}

.tail {
    transform: translate(52.25px);
    transform-origin: center;
}
.tail rect:nth-child(2) {
    transform: translate(3.25px, 10.5px);
    animation: tail-wag calc(var(--fly) * 1s) ease-in-out infinite alternate;
}
@keyframes tail-wag {
    to { transform: translate(3.25px, 10px); }
}

.foot {
    transform: translate(52px);
    animation: feet calc(var(--fly) * 1s) ease-in-out infinite alternate;
}
@keyframes feet {
    to { transform: translate(52.5px); }
}

/* ════════ INDICATORS ════════ */

.zzz {
    position: absolute;
    top: 22px;
    right: 8%;
    font-size: 10px;
    display: none;
    animation: float-zzz 2.5s ease-in-out infinite;
    pointer-events: none;
}
@keyframes float-zzz {
    0%, 100% { transform: translateY(0); opacity: 0.6; }
    50% { transform: translateY(-6px); opacity: 1; }
}
#pet.mood-sleeping .zzz { display: block; }

.mood-indicator {
    position: absolute;
    top: 22px;
    right: 5%;
    font-size: 9px;
    display: none;
    pointer-events: none;
    animation: float-indicator 1.5s ease-in-out infinite;
}
@keyframes float-indicator {
    0%, 100% { transform: translateY(0); opacity: 0.7; }
    50% { transform: translateY(-5px); opacity: 1; }
}
#pet.mood-success .indicator-heart {
    display: flex;
    align-items: center;
    justify-content: center;
}
#pet.mood-error .indicator-warn {
    display: flex;
    align-items: center;
    justify-content: center;
}

.indicator-codebits {
    width: 14px;
    height: 14px;
    display: none;
    font-family: 'ArkPixel', monospace;
    font-size: 10px;
}
.indicator-codebits .bit {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}
.indicator-codebits .bit1 { opacity: 0; }

#pet.mood-writing .indicator-codebits { display: block; }
#pet.mood-writing .indicator-codebits .bit0 { animation: codebit0 0.7s steps(1) infinite; }
#pet.mood-writing .indicator-codebits .bit1 { animation: codebit1 0.7s steps(1) infinite; }

@keyframes codebit0 {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
}
@keyframes codebit1 {
    0%, 49% { opacity: 0; }
    50%, 100% { opacity: 1; }
}

.indicator-bulb {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 16px;
    display: none;
    pointer-events: none;
    animation: bulb-blink 0.8s ease-in-out infinite;
}
.indicator-bulb svg {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
}
@keyframes bulb-blink {
    0%, 100% { opacity: 0.4; filter: brightness(0.85); }
    50% { opacity: 1; filter: brightness(1.15); }
}
#pet.mood-thinking .indicator-bulb { display: block; }

/* ════════ OVERLAY：任务完成庆祝分档（s / m / l；与 mood 独立） ════════ */
@keyframes cele-ok-s {
    0%, 100% { transform: translate(0, 0) scale(1); }
    35% { transform: translate(0, -3px) scale(1.04); }
}
@keyframes cele-ok-m {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(0, -6px) scale(1.07); }
    50% { transform: translate(0, -2px) scale(1.05); }
}
@keyframes cele-ok-l {
    0% { transform: scale(1); filter: brightness(1); }
    40% { transform: scale(1.1); filter: brightness(1.15) drop-shadow(0 0 8px rgba(255, 190, 90, 0.85)); }
    100% { transform: scale(1); filter: brightness(1); }
}

    20% { transform: translateX(-4px); }
    60% { transform: translateX(4px); }
}

#pet[data-celebration-err="1"][data-celebration-tier="m"] .pet-celebrate-layer { animation: cele-err-m 0.55s ease-out 1 both; }
#pet[data-celebration-err="1"][data-celebration-tier="l"] .pet-celebrate-layer { animation: cele-err-l 0.75s ease-out 1 both; }

<script>
var bubbleHideTimer = null;
var celebrationClearTimer = null;
/** 框样式已透明；要再看绿/红参考时在 CSS .pet-look-debug 改回颜色，并置 true */
var SHOW_PET_LOOK_FIELD_DEBUG = false;
/** 转身后再横移的像素（越大越像在「跑过去」） */
var PET_LOOK_NUDGE_PX = 14;
/** 判定区内相对猪中心滞回，略大则不那么神经质 */
var LOOK_HYST_PX = 18;
var petFacingRaf = 0;
var lastPointer = { x: 0, y: 0 };
/** macOS/Windows：仅在外圈内由 Rust 注入坐标；离开外圈时 nativePointerOutside 置 false */
var pointerPollInOuter = false;
var petVisualEl = null;
var petLookShiftEl = null;
/** 'idle' | 'centering' | 'turning' | 'shifting' — 先 translateX→0 原地，再 scaleX，再挪到目标侧 */
var lookAnimPhase = 'idle';
var lookPendingFacing = null;
/** 仅在 idle 时与 data-facing 一致；转身/横移过程中用来和鼠标 desired 比较，避免误判「已经朝向目标」 */
var lookIdleFacing = 'right';
/** 滞回死区内沿用上一次在区内的左右判定，避免贴中线时来回改 desired */
var lookHystSide = 'right';
/** 防止 WebKit 在 data-facing 未变时不触发 transition 导致永远卡在 turning */
var lookFlipSafetyTimer = null;

function clearLookFlipSafetyTimer() {
    if (lookFlipSafetyTimer) {
        clearTimeout(lookFlipSafetyTimer);
        lookFlipSafetyTimer = null;
    }
}

function syncLookNudgeToFacing() {
    var petEl = document.getElementById('pet');
    if (!petEl) return;
    var left = petEl.getAttribute('data-facing') === 'left';
    petEl.style.setProperty('--pet-look-nudge', (left ? -PET_LOOK_NUDGE_PX : PET_LOOK_NUDGE_PX) + 'px');
}

function getLookNudgePx() {
    var petEl = document.getElementById('pet');
    if (!petEl) return 0;
    var v = getComputedStyle(petEl).getPropertyValue('--pet-look-nudge').trim();
    var m = v.match(/^(-?[0-9.]+)px$/);
    return m ? parseFloat(m[1]) : 0;
}

/** 转身动画结束（或朝向本就不必变）后：处理 pending，再进入横移 */
function finishLookFlipOrAdvance() {
    var petEl = document.getElementById('pet');
    if (!petEl) return;
    clearLookFlipSafetyTimer();
    if (lookPendingFacing) {
        var p = lookPendingFacing;
        lookPendingFacing = null;
        lookIdleFacing = p;
        if (p !== petEl.getAttribute('data-facing')) {
            petEl.setAttribute('data-facing', p);
            armLookFlipSafetyTimer();
            return;
        }
    }
    lookAnimPhase = 'shifting';
    var left = petEl.getAttribute('data-facing') === 'left';
    var px = left ? -PET_LOOK_NUDGE_PX : PET_LOOK_NUDGE_PX;
    requestAnimationFrame(function() {
        requestAnimationFrame(function() {
            petEl.style.setProperty('--pet-look-nudge', px + 'px');
        });
    });
}

function armLookFlipSafetyTimer() {
    clearLookFlipSafetyTimer();
    lookFlipSafetyTimer = setTimeout(function() {
        lookFlipSafetyTimer = null;
        if (lookAnimPhase === 'turning') finishLookFlipOrAdvance();
    }, 900);
}

/** 开始转身：若 DOM 朝向已是目标，浏览器不会触发 transitionend，必须直接 finish */
function tryStartLookFlip(petEl) {
    lookAnimPhase = 'turning';
    var next = lookIdleFacing;
    if (petEl.getAttribute('data-facing') === next) {
        finishLookFlipOrAdvance();
    } else {
        petEl.setAttribute('data-facing', next);
        armLookFlipSafetyTimer();
    }
}

function scheduleLookFacingTurn(target) {
    var petEl = document.getElementById('pet');
    if (!petEl) return;
    if (lookAnimPhase !== 'idle') {
        lookPendingFacing = target;
        return;
    }
    if (target === lookIdleFacing) return;
    lookIdleFacing = target;
    if (Math.abs(getLookNudgePx()) < 1) {
        tryStartLookFlip(petEl);
        return;
    }
    lookAnimPhase = 'centering';
    if (petLookShiftEl) petLookShiftEl.classList.add('look-shift-recenter');
    petEl.style.setProperty('--pet-look-nudge', '0px');
}

function onPetLookFlipTransitionEnd(e) {
    if (!petVisualEl || e.target !== petVisualEl) return;
    if (e.propertyName !== 'transform') return;
    if (lookAnimPhase !== 'turning') return;
    clearLookFlipSafetyTimer();
    finishLookFlipOrAdvance();
}

function onPetLookShiftTransitionEnd(e) {
    if (!petLookShiftEl || e.target !== petLookShiftEl) return;
    if (e.propertyName !== 'transform') return;
    var petEl = document.getElementById('pet');
    if (lookAnimPhase === 'centering') {
        if (petLookShiftEl) petLookShiftEl.classList.remove('look-shift-recenter');
        if (lookPendingFacing) {
            lookIdleFacing = lookPendingFacing;
            lookPendingFacing = null;
        }
        tryStartLookFlip(petEl);
        return;
    }
    if (lookAnimPhase !== 'shifting') return;
    lookAnimPhase = 'idle';
    if (lookPendingFacing) {
        var p = lookPendingFacing;
        lookPendingFacing = null;
        if (p !== lookIdleFacing) {
            scheduleLookFacingTurn(p);
        }
    }
}

/** Rust：光标离开窗口外圈时调用，避免 lastPointer 停在外圈外仍驱动朝向 */
function nativePointerOutside() {
    pointerPollInOuter = false;
}

/** Rust：逻辑坐标（与 WebView 客户区一致） */
function nativePointerLook(lx, ly) {
    pointerPollInOuter = true;
    lastPointer.x = lx;
    lastPointer.y = ly;
    if (!petFacingRaf) petFacingRaf = requestAnimationFrame(flushPetFacingFromPointer);
}

function flushPetFacingFromPointer() {
    petFacingRaf = 0;
    var petEl = document.getElementById('pet');
    if (!petEl) return;
    var usePoll = window.__nixiePointerPoll === true;
    if (usePoll && !pointerPollInOuter) return;
    var clientX = lastPointer.x;
    var clientY = lastPointer.y;
    var r = petEl.getBoundingClientRect();
    if (r.width <= 0 || r.height <= 0) return;
    var cx = r.left + r.width * 0.5;
    var cy = r.top + r.height * 0.5;
    var inZone;
    if (usePoll) {
        inZone = clientX >= 0 && clientY >= 0 &&
            clientX <= window.innerWidth && clientY <= window.innerHeight;
    } else {
        var st = getComputedStyle(petEl);
        var zwM = parseFloat(st.getPropertyValue('--look-zone-w')) || 2.65;
        var zhM = parseFloat(st.getPropertyValue('--look-zone-h')) || 3.05;
        var zw = r.width * zwM;
        var zh = r.height * zhM;
        inZone = clientX >= cx - zw * 0.5 && clientX <= cx + zw * 0.5 &&
            clientY >= cy - zh * 0.5 && clientY <= cy + zh * 0.5;
    }
    if (!inZone) return;
    var desired = lookHystSide;
    if (clientX > cx + LOOK_HYST_PX) desired = 'right';
    else if (clientX < cx - LOOK_HYST_PX) desired = 'left';
    lookHystSide = desired;
    if (desired !== lookIdleFacing) scheduleLookFacingTurn(desired);
}

function queuePetFacingFromPointer(e) {
    lastPointer.x = e.clientX;
    lastPointer.y = e.clientY;
    if (!petFacingRaf) petFacingRaf = requestAnimationFrame(flushPetFacingFromPointer);
}
/** Git 分支名（如 feature/xxx）仅作角标；过长时截断，避免像「又念了一整句台词」 */
/** 定时刷新：只更新 Hook 小圆点（git 分支提示见 showGitTip，仅仓库变化时由 Rust 推送） */
function syncNativeHints(hasExt) {
    var dot = document.getElementById('ext-dot');
    if (hasExt) dot.classList.add('active');
    else dot.classList.remove('active');
}
// 气泡与当前状态绑定：切换状态时旧气泡消失、显示新状态台词并重新计时 2.5s，故不一定会显示满 2.5s
function setFocusFileHint(name) {
    var el = document.getElementById('focus-file-hint');
    if (!el) return;
    var s = name != null && String(name).length ? String(name) : '';
    el.textContent = s;
}
function updateMood(mood, label, hasExt, quote, focusFile) {
    document.getElementById('pet').className = 'mood-' + mood;
    document.getElementById('mood-text').textContent = quote !== undefined ? quote : label;
    if (focusFile !== undefined) {
        setFocusFileHint(focusFile);
    }
    var dot = document.getElementById('ext-dot');
    if (hasExt) dot.classList.add('active');
    else dot.classList.remove('active');

    var bubble = document.getElementById('bubble');
    if (bubbleHideTimer) clearTimeout(bubbleHideTimer);
    bubble.classList.add('bubble-visible');
    bubbleHideTimer = setTimeout(function() {
        bubble.classList.remove('bubble-visible');
        bubbleHideTimer = null;
    }, 2500);
}
/** 本地 git 分支切换 / 同分支新提交等：由 Rust 在快照变化时推送，不占心情台词位 */
function showGitTip(msg) {
    var bubble = document.getElementById('bubble');
    document.getElementById('mood-text').textContent = msg || '';
    if (bubbleHideTimer) clearTimeout(bubbleHideTimer);
    bubble.classList.add('bubble-visible');
    bubbleHideTimer = setTimeout(function() {
        bubble.classList.remove('bubble-visible');
        bubbleHideTimer = null;
    }, 2800);
}
// 工具成功等一次性提示：当前形态下气泡展示文案并跳跃一下（不切换状态）
function showToast(msg) {
    var pet = document.getElementById('pet');
    var bubble = document.getElementById('bubble');
    document.getElementById('mood-text').textContent = msg || '\u6267\u884c\u6210\u529f\uff01';
    if (bubbleHideTimer) clearTimeout(bubbleHideTimer);
    bubble.classList.add('bubble-visible');
    pet.classList.add('pet-jump');
    setTimeout(function() { pet.classList.remove('pet-jump'); }, 320);
    bubbleHideTimer = setTimeout(function() {
        bubble.classList.remove('bubble-visible');
        bubbleHideTimer = null;
    }, 2500);
}
/** 同一次脚本里先切 mood 再挂庆祝，避免 WKWebView 在两段 evaluate 之间绘制一帧「仍是 writing 皮 + 庆祝层」 */
function updateMoodThenApplyCelebration(mood, label, hasExt, quote, focusFile, tier, durationMs, isError) {
    updateMood(mood, label, hasExt, quote, focusFile);
    applyCelebrationTier(tier, durationMs, isError);
}
/** Overlay：庆祝分档（与 Core mood 独立；未来 AnimalRenderer 可接不同动效） */
function applyCelebrationTier(tier, durationMs, isError) {
    var pet = document.getElementById('pet');
    pet.setAttribute('data-celebration-tier', tier || '');
    pet.setAttribute('data-celebration-ms', String(durationMs || 0));
    pet.setAttribute('data-celebration-err', isError ? '1' : '0');
    if (celebrationClearTimer) clearTimeout(celebrationClearTimer);
    celebrationClearTimer = setTimeout(function() {
        pet.removeAttribute('data-celebration-tier');
        pet.removeAttribute('data-celebration-ms');
        pet.removeAttribute('data-celebration-err');
        celebrationClearTimer = null;
    }, 2400);
}
function setFeedAvailable(can) {
    var pet = document.getElementById('pet');
    pet.setAttribute('data-can-feed', can ? '1' : '0');
}
function setWalkPhase(phase) {
    var pet = document.getElementById('pet');
    pet.setAttribute('data-walk-phase', phase || 'off');
}

var pomoInterval = null;
var pomoRemainingSec = 0;
/** 剩余秒数 ≤ 此值（8 分钟）时番茄气泡切为绿色 */
var POMO_GREEN_AT_SEC = 8 * 60;

function getPomoDurationSec() {
    try {
        var v = localStorage.getItem('nixie.pomodoroSec');
        if (v) return Math.max(60, parseInt(v, 10) || 1500);
    } catch (e) {}
    return 1500;
}

function isPomodoroRunning() {
    return pomoInterval != null && pomoRemainingSec > 0;
}

function syncPomoMenuLabel() {
    var btn = document.getElementById('menu-pomo-toggle');
    if (!btn) return;
    btn.textContent = isPomodoroRunning() ? '番茄钟 · 停止' : '番茄钟 · 开始';
}

function updatePomodoroBadgeUi() {
    var pet = document.getElementById('pet');
    var pomoText = document.getElementById('pomodoro-text');
    var running = isPomodoroRunning();
    pet.setAttribute('data-pomo-running', running ? '1' : '0');
    if (running) {
        pet.setAttribute('data-pomo-phase', pomoRemainingSec <= POMO_GREEN_AT_SEC ? 'green' : 'red');
        var m = Math.floor(pomoRemainingSec / 60);
        var s = pomoRemainingSec % 60;
        if (pomoText) pomoText.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    } else {
        pet.removeAttribute('data-pomo-phase');
        if (pomoText) pomoText.textContent = '';
    }
    syncPomoMenuLabel();
}

function startPomodoro() {
    stopPomodoro();
    pomoRemainingSec = getPomoDurationSec();
    pomoInterval = setInterval(function() {
        pomoRemainingSec--;
        updatePomodoroBadgeUi();
        if (pomoRemainingSec <= 0) {
            stopPomodoro();
            playPomodoroBeep();
            showToast('专注时间到！');
        }
    }, 1000);
    updatePomodoroBadgeUi();
}

function stopPomodoro() {
    if (pomoInterval != null) {
        clearInterval(pomoInterval);
        pomoInterval = null;
    }
    pomoRemainingSec = 0;
    updatePomodoroBadgeUi();
}

function togglePomodoro() {
    if (isPomodoroRunning()) {
        stopPomodoro();
    } else {
        startPomodoro();
    }
}

function playPomodoroBeep() {
    try {
        var Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        var ctx = new Ctx();
        var o = ctx.createOscillator();
        var g = ctx.createGain();
        o.connect(g);
        g.connect(ctx.destination);
        o.frequency.value = 880;
        g.gain.value = 0.08;
        o.start();
        setTimeout(function() {
            o.stop();
            ctx.close();
        }, 180);
    } catch (e) {}
}

function closePixelMenu() {
    document.getElementById('context-menu').hidden = true;
}

function openPixelMenu(clientX, clientY) {
    var m = document.getElementById('context-menu');
    refreshMenuFeedState();
    syncPomoMenuLabel();
    m.hidden = false;
    m.style.left = Math.min(clientX, window.innerWidth - 116) + 'px';
    m.style.top = Math.min(clientY, window.innerHeight - 88) + 'px';
}

function refreshMenuFeedState() {
    var pet = document.getElementById('pet');
    var can = pet.getAttribute('data-can-feed') !== '0';
    document.getElementById('menu-feed').disabled = !can;
    document.getElementById('menu-hint').textContent = can ? '' : '投喂冷却中…';
}

function onFeedResult(ok) {
    if (ok) {
        showToast('好甜！');
        setFeedAvailable(false);
        var apple = document.getElementById('feed-apple');
        apple.classList.remove('feed-apple-fly');
        void apple.offsetWidth;
        apple.classList.add('feed-apple-fly');
        setTimeout(function() {
            apple.classList.remove('feed-apple-fly');
        }, 900);
    } else {
        showToast('还在冷却中…');
    }
    refreshMenuFeedState();
}

document.addEventListener('DOMContentLoaded', function() {
    petVisualEl = document.querySelector('#pet .pet-visual');
    petLookShiftEl = document.querySelector('#pet .pet-look-shift');
    if (petVisualEl) petVisualEl.addEventListener('transitionend', onPetLookFlipTransitionEnd);
    if (petLookShiftEl) petLookShiftEl.addEventListener('transitionend', onPetLookShiftTransitionEnd);
    lookIdleFacing = document.getElementById('pet').getAttribute('data-facing') || 'right';
    lookHystSide = lookIdleFacing;
    syncLookNudgeToFacing();
    var lookField = document.getElementById('pet-look-field');
    if (lookField && SHOW_PET_LOOK_FIELD_DEBUG) lookField.classList.add('pet-look-debug');
    if (!window.__nixiePointerPoll) {
        document.addEventListener('mousemove', queuePetFacingFromPointer);
    }
    document.getElementById('pet').className = 'mood-sleeping';
    setTimeout(function() {
        document.getElementById('pet').className = 'mood-idle';
    }, 800);

    var petEl = document.getElementById('pet');
    petEl.addEventListener('mousedown', function(e) {
        if (e.button === 0) {
            window.ipc.postMessage('drag');
        }
    });
    petEl.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        openPixelMenu(e.clientX, e.clientY);
    });
    /* wry/WKWebView：右键菜单打开后，菜单项上 click 常不触发；改用 mousedown + 阻止冒泡 */
    function menuItemActivate(e, fn) {
        if (e.button !== 0) return;
        e.preventDefault();
        e.stopPropagation();
        try {
            fn();
        } catch (err) {}
        closePixelMenu();
    }
    document.getElementById('menu-pomo-toggle').addEventListener('mousedown', function(e) {
        menuItemActivate(e, function() {
            togglePomodoro();
        });
    });
    document.getElementById('menu-feed').addEventListener('mousedown', function(e) {
        menuItemActivate(e, function() {
            if (document.getElementById('menu-feed').disabled) return;
            window.ipc.postMessage('feed');
        });
    });
    document.addEventListener('mousedown', function(e) {
        if (e.button !== 0) return;
        var menu = document.getElementById('context-menu');
        if (menu.hidden) return;
        if (menu.contains(e.target)) return;
        closePixelMenu();
    }, true);
});
</script>
